<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>展覧会｜千葉かくう美術館｜MOIC</title>
  <meta property="og:description" content="千葉かくう美術館（MOIC）は、戦後から現代にかけての国内外の美術動向を捉えることを目的に、約7,000点の作品を収蔵しています。">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="./images/favi_moic.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Stick&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="./js/main.js" defer></script>
</head>

<body>
  <header id="js-header" class="site-header"></header>

  <main class="inner-main js-fade">
    <section class="exhibitions-page main-container">
      <section>
        <h2>開催中・これからの展覧会</h2>
        <h3 class="underline-head">2025年度 展覧会ラインナップ</h3>
        <ul class="card-list">
          <li>
            <a class="card is-clickable" href="#">
              <span class="card-title">クララ・ダ・コスタ「ヒドゥン・コレクション 1984」
              </span>
              <p class="period">2025年10月5日[日] – 2026年1月18日[日]</p>
              <img src="./images/exhibit-01.jpg" width="450" height="300">
            </a>
          </li>
        </ul>
      </section>

      <section>
        <h2>過去の展覧会</h2>

        <h3 class="underline-head">2024年度</h3>
        <ul class="card-list">
          <li>
            <a class="card is-clickable" href="#">
              <span class="card-title">エリカ・ノヴァーク「永遠の鏡：無限回廊」
              </span>
              <p class="period">2024年10月12日[土] – 2025年1月26日[日]</p>
              <img src="./images/exhibit-02.jpg" width="450" height="300">
            </a>
          </li>
        </ul>
      </section>
    </section>
  </main>

  <footer id="js-footer" class="site-footer"></footer>
</body>

</html>
