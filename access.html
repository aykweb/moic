<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アクセス｜千葉かくう美術館｜MOIC</title>
  <meta property="og:description" content="千葉かくう美術館（MOIC）は、戦後から現代にかけての国内外の美術動向を捉えることを目的に、約7,000点の作品を収蔵しています。">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="./images/favi_moic.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Stick&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
    <script src="./js/main.js" defer></script>
</head>

<body>
  <header id="js-header" class="site-header"></header>

  <main class="inner-main js-fade">
    <section class="access-page main-container">
      <h2 class="section-head">アクセス</h2>

      <div class="scroll-columns">
        <a href="#access-on-foot" class="scroll-link is-clickable">
          <span class="scroll-btn" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="5 11 12 16 19 11"></polyline>
            </svg>
          </span>
          <span class="scroll-text">徒歩でお越しの方</span>
        </a>

        <a href="#access-by-car" class="scroll-link">
          <span class="scroll-btn" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="5 11 12 16 19 11"></polyline>
            </svg>
          </span>
          <span class="scroll-text">お車でお越しの方</span>
        </a>

        <a href="#access-accessibility" class="scroll-link">
          <span class="scroll-btn" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="5 11 12 16 19 11"></polyline>
            </svg>
          </span>
          <span class="scroll-text">アクセシビリティ</span>
        </a>
      </div>
      <div class="map">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d25912.395390039786!2d140.200272!3d35.725003!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x602288d3f0c85c9f%3A0xe3014ef40fa3bdf9!2z5L2Q5YCJ5Z-O5Z2A5YWs5ZyS!5e0!3m2!1sja!2sjp!4v1754964338819!5m2!1sja!2sjp"
          width="600" height="400" style="border:0;" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
      <div class="page-columns">
        <section id="access-on-foot" class="anchor-target">
          <h3 class="page-subtitle">徒歩でお越しの方</h3>
          <dl class="info-columns">
            <dt>最寄駅</dt>
            <dd>
              <p>京成本線「京成佐倉駅」より徒歩20分</p>
              <p>JR成田線「JR佐倉駅」より徒歩25分</p>
            </dd>
          </dl>
        </section>

        <section id="access-by-car" class="anchor-target">
          <h3 class="page-subtitle">お車でお越しの方</h3>
          <dl class="info-columns">
            <dt>東京方面</dt>
            <dd>首都高速→(京葉道路・首都高湾岸線)→東関東自動車道・四街道IC→案内板に従ってICから約8km</dd>
          </dl>
          <dl class="info-columns">
            <dt>成田方面</dt>
            <dd>東関東自動車道・佐倉IC→案内板に従ってICから約8km</dd>
          </dl>
          <dl class="info-columns">
            <dt>駐車場</dt>
            <dd>佐倉城址公園内（無料）</dd>
          </dl>
        </section>
      </div>
      <section id="access-accessibility" class="anchor-target">
        <h3 class="page-subtitle">アクセシビリティガイド</h3>
        <p>
          車椅子ルートあり／多目的トイレあり／補助犬同伴可能
        </p>
        <p>
          アクセシビリティガイドはロビーにて配布しています。
          ウェブ版は<a href="#" class="text-link">こちら<i class="bi bi-box-arrow-up-right"></i></a>からご確認ください。
        </p>
      </section>
    </section>
  </main>
  <footer id="js-footer" class="site-footer"></footer>
</body>

</html>
