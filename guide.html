<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ご利用案内｜MUSEUM OF IMAGINARY, CHIBA</title>
  <meta property="og:description" content="千葉かくう美術館（MOIC）は、戦後から現代にかけての国内外の美術動向を捉えることを目的に、約7,000点の作品を収蔵しています。">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="./images/favi_moic.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Stick&display=swap"

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <script src="./js/main.js" defer></script>

<body>
  <header id="js-header" class="site-header"></header>

  <main class="inner-main js-fade">
    <section class="guide-page main-container">
      <h2 class="section-head">ご利用案内</h2>
      <figure class="page-hero">
        <img src="./images/guide-hero.jpg" alt="MOICの外観" width="800" height="533">
      </figure>
      <div class="page-columns">
        <section>
          <h3 class="page-subtitle">開館時間・休館日</h3>
          <dl class="info-columns">
            <dt>開館時間</dt>
            <dd>
              <p>10:00〜18:00</p>
              <ul class="note-list">
                <li>展示室入場は閉館の30分前まで</li>
              </ul>
            </dd>
          </dl>
          <dl class="info-columns">
            <dt>休館日</dt>
            <dd>
              <p>月曜日、年末年始、展示替え期間</p>
              <ul class="note-list">
                <li>年末年始期間（2025/12/28-2026/1/5）</li>
              </ul>
            </dd>
          </dl>
        </section>

        <section>
          <h3 class="page-subtitle">アクセス</h3>
          <dl class="info-columns">
            <dt>最寄駅</dt>
            <dd>
              <p>京成本線「京成佐倉駅」より徒歩20分</p>
              <p>JR成田線「JR佐倉駅」より徒歩25分</p>
            </dd>
          </dl>
        </section>
      </div>
    </section>
  </main>
  <footer id="js-footer" class="site-footer"></footer>
